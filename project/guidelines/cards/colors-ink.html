<!-- @dsCard group="Colors" viewport="700x130" name="Ink / neutral ramp" subtitle="The usable grayscale that keeps the storefront readable" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 16px; background: var(--paper); }
  .ramp { display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px; }
  .cell { border: var(--border-w-1) solid var(--ink-300); border-radius: var(--radius-sm); height: 88px; display: flex; flex-direction: column; justify-content: flex-end; padding: 5px; }
  .n { font-family: var(--font-mono); font-size: 9px; font-weight: 700; }
</style>
</head>
<body>
  <div class="ramp">
    <div class="cell" style="background:var(--ink-950);color:#fff;border-color:var(--ink-700);"><span class="n">950</span></div>
    <div class="cell" style="background:var(--ink-900);color:#fff;border-color:var(--ink-700);"><span class="n">900</span></div>
    <div class="cell" style="background:var(--ink-800);color:#fff;border-color:var(--ink-700);"><span class="n">800</span></div>
    <div class="cell" style="background:var(--ink-700);color:#fff;"><span class="n">700</span></div>
    <div class="cell" style="background:var(--ink-600);color:#fff;"><span class="n">600</span></div>
    <div class="cell" style="background:var(--ink-500);color:#fff;"><span class="n">500</span></div>
    <div class="cell" style="background:var(--ink-400);color:#000;"><span class="n">400</span></div>
    <div class="cell" style="background:var(--ink-300);color:#000;"><span class="n">300</span></div>
    <div class="cell" style="background:var(--ink-200);color:#000;"><span class="n">200</span></div>
    <div class="cell" style="background:var(--ink-100);color:#000;"><span class="n">100</span></div>
    <div class="cell" style="background:var(--ink-050);color:#000;"><span class="n">050</span></div>
  </div>
</body>
</html>
