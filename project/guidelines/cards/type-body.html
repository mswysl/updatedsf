<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--paper); }
  .wrap { max-width: 560px; }
  .lead { font-size: 18px; line-height: 1.5; margin: 0 0 10px; }
  .p { font-size: 15px; line-height: 1.6; color: var(--ink-700); margin: 0 0 10px; }
  .sm { font-size: 13px; color: var(--ink-500); margin: 0; }
  b { color: var(--text); }
</style>
</head>
<body>
  <div class="wrap">
    <p class="lead">Bootleg-grade death metal merch, sourced and printed for the underground.</p>
    <p class="p">Every drop is <b>strictly limited</b>. Heavyweight cotton, screen-printed by hand, no restocks. When it's gone, it's gone &mdash; same as the demo tapes it's printed for.</p>
    <p class="sm">Ships worldwide in 3&ndash;5 days. Reg. 400 · Med. 500 · Bold 700.</p>
  </div>
</body>
</html>
