<!-- @dsCard group="Storefront" viewport="1280x900" name="Storefront — home / catalog / product / cart" subtitle="Interactive WooCommerce-style death metal merch store" -->
<!-- @startingPoint section="Storefront" subtitle="Full death-metal merch storefront — hero, catalog, product, cart" viewport="1280x900" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MSWYSL Merchandising</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { margin: 0; background: var(--paper); }
  #toast { position: fixed; right: 20px; bottom: 20px; z-index: 1100; display: flex; flex-direction: column; gap: 10px; }
  .toast-enter { animation: toastIn 200ms cubic-bezier(0.2,0.8,0.2,1); }
  @keyframes toastIn { from { transform: translateY(12px); opacity: 0; } to { transform: none; opacity: 1; } }
</style>
</head>
<body>
  <div id="root"></div>
  <div id="toast"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script src="https://unpkg.com/lucide@0.456.0/dist/umd/lucide.min.js"></script>
  <script src="products.js"></script>
  <script type="text/babel" data-presets="react" src="Header.jsx"></script>
  <script type="text/babel" data-presets="react" src="Hero.jsx"></script>
  <script type="text/babel" data-presets="react" src="Catalog.jsx"></script>
  <script type="text/babel" data-presets="react" src="ProductDetail.jsx"></script>
  <script type="text/babel" data-presets="react" src="CartDrawer.jsx"></script>
  <script type="text/babel" data-presets="react" src="Footer.jsx"></script>

  <script type="text/babel" data-presets="react">
    const { Toast } = window.MSWYSLDesignSystem_d8bb48;
    const { Header, Hero, Catalog, ProductDetail, CartDrawer, Footer } = window;
    const TYPES = ['Apparel', 'Vinyl', 'Accessories'];

    function App() {
      const [view, setView] = React.useState('home');     // home | catalog | product
      const [nav, setNav] = React.useState('Drops');
      const [current, setCurrent] = React.useState(null);
      const [cart, setCart] = React.useState([]);
      const [cartOpen, setCartOpen] = React.useState(false);
      const [toasts, setToasts] = React.useState([]);
      const products = window.MS_PRODUCTS;

      React.useEffect(() => { window.lucide && window.lucide.createIcons({ attrs: { width: 18, height: 18 } }); });

      const pushToast = (t) => {
        const id = Math.random().toString(36).slice(2);
        setToasts((cur) => [...cur, { ...t, id }]);
        setTimeout(() => setToasts((cur) => cur.filter((x) => x.id !== id)), 2600);
      };

      const goHome = () => { setView('home'); setNav('Drops'); window.scrollTo(0, 0); };
      const goNav = (v, n) => {
        if (v === 'home') return goHome();
        setNav(n); setView('catalog'); window.scrollTo(0, 0);
      };
      const openProduct = (p) => { setCurrent(p); setView('product'); window.scrollTo(0, 0); };

      const addToCart = (p, size, qty) => {
        const key = p.id + (size || '');
        setCart((cur) => {
          const found = cur.find((it) => it.key === key);
          if (found) return cur.map((it) => it.key === key ? { ...it, qty: it.qty + (qty || 1) } : it);
          return [...cur, { key, id: p.id, title: p.title, artist: p.artist, image: p.image, price: p.price, size: size || null, qty: qty || 1 }];
        });
        pushToast({ variant: 'success', title: 'Added to cart', message: `${p.title}${size ? ' · ' + size : ''}` });
      };
      const setQty = (key, q) => setCart((cur) => cur.map((it) => it.key === key ? { ...it, qty: q } : it));
      const removeItem = (key) => setCart((cur) => cur.filter((it) => it.key !== key));

      const cartCount = cart.reduce((s, it) => s + it.qty, 0);
      const navProducts = TYPES.includes(nav) ? products.filter((p) => p.type === nav) : products;

      return (
        <React.Fragment>
          <Header cartCount={cartCount} activeNav={view === 'catalog' ? nav : null}
            onNav={goNav} onCart={() => setCartOpen(true)} onSearch={() => goNav('catalog', 'Drops')} />

          {view === 'home' ? (
            <main>
              <Hero onShop={() => goNav('catalog', 'Drops')} />
              <Catalog products={products.slice(0, 4)} title="New Drops" showFacets={false} columns={4}
                onAdd={addToCart} onOpen={openProduct} />
              <Footer />
            </main>
          ) : null}

          {view === 'catalog' ? (
            <main>
              <Catalog products={navProducts} title={nav} onAdd={addToCart} onOpen={openProduct} />
              <Footer />
            </main>
          ) : null}

          {view === 'product' && current ? (
            <main>
              <ProductDetail product={current} onBack={() => goNav('catalog', nav)}
                onAdd={(p, size, qty) => { addToCart(p, size, qty); setCartOpen(true); }} />
              <Footer />
            </main>
          ) : null}

          <CartDrawer open={cartOpen} items={cart} onClose={() => setCartOpen(false)}
            onQty={setQty} onRemove={removeItem} />

          <ToastStack toasts={toasts} onClose={(id) => setToasts((c) => c.filter((x) => x.id !== id))} />
        </React.Fragment>
      );
    }

    function ToastStack({ toasts, onClose }) {
      return ReactDOM.createPortal(
        toasts.map((t) => (
          <div key={t.id} className="toast-enter">
            <Toast variant={t.variant} title={t.title} message={t.message} onClose={() => onClose(t.id)} />
          </div>
        )),
        document.getElementById('toast')
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
