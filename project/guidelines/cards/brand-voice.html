<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--ink-950); color: var(--white); }
  .quote { font-family: var(--font-display); text-transform: uppercase; transform: var(--display-skew); font-size: 30px; line-height: 0.98; letter-spacing: -0.02em; margin: 0 0 16px; }
  .quote .lime { color: var(--lime-500); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 24px; }
  .pair { display: flex; gap: 8px; font-family: var(--font-mono); font-size: 11px; align-items: baseline; }
  .do { color: var(--lime-500); font-weight: 700; flex: none; width: 16px; }
  .dont { color: var(--pink-400); font-weight: 700; flex: none; width: 16px; }
  .txt { color: var(--ink-300); }
</style>
</head>
<body>
  <p class="quote">Strictly limited. <span class="lime">No restocks.</span> Fuck the resellers.</p>
  <div class="grid">
    <div class="pair"><span class="do">DO</span><span class="txt">Blunt, lowercase asides. Underground slang.</span></div>
    <div class="pair"><span class="dont">NO</span><span class="txt">Corporate "we're excited to announce".</span></div>
    <div class="pair"><span class="do">DO</span><span class="txt">UPPERCASE for product names &amp; CTAs.</span></div>
    <div class="pair"><span class="dont">NO</span><span class="txt">Emoji, exclamation spam, hype filler.</span></div>
  </div>
</body>
</html>
