<!-- @dsCard group="Colors" viewport="700x110" name="Pink ramp" subtitle="Hot pink derived for hover, press, tints & washes" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 16px; background: var(--paper); }
  .ramp { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .cell { border: var(--border-w-2) solid var(--black); border-radius: var(--radius-sm); height: 78px; display: flex; flex-direction: column; justify-content: flex-end; padding: 6px; }
  .n { font-family: var(--font-mono); font-size: 10px; font-weight: 700; letter-spacing: 0.04em; }
  .h { font-family: var(--font-mono); font-size: 9px; opacity: 0.8; }
</style>
</head>
<body>
  <div class="ramp">
    <div class="cell" style="background:var(--pink-700);color:#fff;"><span class="n">700</span><span class="h">#99005C</span></div>
    <div class="cell" style="background:var(--pink-600);color:#fff;"><span class="n">600</span><span class="h">#D6007F</span></div>
    <div class="cell" style="background:var(--pink-500);color:#fff;"><span class="n">500</span><span class="h">#FF009A</span></div>
    <div class="cell" style="background:var(--pink-400);color:#fff;"><span class="n">400</span><span class="h">#FF4DB8</span></div>
    <div class="cell" style="background:var(--pink-200);color:#000;"><span class="n">200</span><span class="h">#FFB3DF</span></div>
    <div class="cell" style="background:var(--pink-050);color:#000;"><span class="n">050</span><span class="h">#FFE6F4</span></div>
    <div class="cell" style="background:var(--white);color:#000;border-color:var(--ink-200);"><span class="n">PAPER</span><span class="h">on white</span></div>
  </div>
</body>
</html>
