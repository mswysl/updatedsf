<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--ink-950); }

</style>
</head>
<body>
  <p class="disp big">REAL AS <span class="pink">REAL</span> CAN GET</p>
  <div class="meta">
    <span>Archivo Black</span><span>900 / UPPER</span><span>skewX(-7&deg;)</span><span>SUBSTITUTE</span>

</html>
