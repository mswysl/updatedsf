<!-- @dsCard group="Components" viewport="700x430" name="Forms — Input, Select, Checkbox, Quantity" subtitle="Hard borders, mono labels, lime focus + fill" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--paper); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px 24px; max-width: 640px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-400); margin: 0 0 10px; }
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; gap: 14px; align-items: center; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="../../vendor/react.js"></script>
  <script src="../../vendor/react-dom.js"></script>
  <script src="../../vendor/babel.js"></script>
  <script src="../../_ds_bundle.js"></script>
  <script src="../../vendor/lucide.js"></script>
  <script type="text/babel">
    const { Input, Select, Checkbox, QuantityStepper } = window.MSWYSLDesignSystem_d8bb48;
    const I = (n) => <i data-lucide={n}></i>;
    function Demo() {
      return (
        <div className="grid">
          <div>
            <p className="lbl">Input</p>
            <div className="stack">
              <Input label="Email" placeholder="you@domain.com" required />
              <Input leadingIcon={I('search')} placeholder="Search the catalog" />
              <Input label="Discount code" error hint="Code expired" defaultValue="DOOM" />
            </div>
          </div>
          <div>
            <p className="lbl">Select</p>
            <div className="stack">
              <Select placeholder="Select size" options={['Small','Medium','Large','XL']} />
              <Select options={[{value:'new',label:'Sort: Newest'},{value:'price',label:'Sort: Price'},{value:'az',label:'Sort: A–Z'}]} />
              <Select disabled options={['Out of stock']} />
            </div>
          </div>
          <div>
            <p className="lbl">Checkbox</p>
            <div className="stack">
              <Checkbox label="In stock only" defaultChecked />
              <Checkbox label="Pre-orders" />
              <Checkbox label="Discontinued" disabled />
            </div>
          </div>
          <div>
            <p className="lbl">Quantity</p>
            <div className="stack">
              <div className="row"><QuantityStepper defaultValue={1} /></div>
              <div className="row"><QuantityStepper size="sm" defaultValue={4} /></div>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
    setTimeout(() => window.lucide && window.lucide.createIcons(), 60);
  </script>
</body>
</html>
